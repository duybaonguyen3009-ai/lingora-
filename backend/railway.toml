# railway.toml — Railway deployment config for Lingona backend
#
# Docs: https://docs.railway.com/reference/config-as-code
#
# Lives at backend/ — i.e. the SERVICE ROOT DIRECTORY (Settings →
# Service → Root Directory = "backend"). Railway resolves config-as-code
# from the service root, NOT the repo root. A railway.toml at the repo
# root is silently ignored when Root Directory is non-default. This was
# the root cause of the Wave 2.10 hotfix 2/2 incident (commit 42dce70
# deployed with no migration step because the repo-root railway.toml
# from INFRA-001 was invisible to Railway).
#
# The container's WORKDIR ends up = /app, with the contents of THIS
# directory copied into it. Do NOT prefix commands with `cd backend &&` —
# that path does not exist inside the container (incident 2026-04-24).
#
# Key design (defense in depth — three layers):
#   - releaseCommand wraps node-pg-migrate in scripts/release.sh which sets
#     `set -euo pipefail` so a failed migration emits a non-zero exit and
#     Railway can refuse cutover. (Layer 1 — release-phase container.)
#   - healthcheckPath points at /health/schema, an endpoint that compares
#     the deployed image's latest migration filename against the most
#     recent row in pgmigrations. Schema drift → 500 → Railway healthcheck
#     fails → cutover blocks. (Layer 2 — start-container drift detector.)
#   - package.json `prestart` hook runs node-pg-migrate again before
#     `node src/server.js` boots. Platform-neutral, npm-semantic
#     fail-closed: prestart non-zero ⇒ start never executes ⇒ container
#     crashes ⇒ Railway restartPolicyType=ON_FAILURE retries. Defends
#     against any future Railway behavior change that breaks Layer 1.
#     (Layer 3 — start-container migration gate.)
#
# Together these defend against the Wave 2 silent migration drift incident
# (commits 5beb62f → 2d83c23) and the Wave 2.10 release-phase-skipped
# variant (commit 42dce70 → 45c120f → THIS hotfix). Postmortem in
# docs/MIGRATIONS.md and docs/POSTMORTEM-INFRA-001.md.

[build]
builder = "NIXPACKS"

[deploy]
startCommand    = "npm start"
# Layer 1: migration gate. Wrapper enforces fail-closed exit code.
releaseCommand  = "bash scripts/release.sh"
# Layer 2: schema-aware readiness check.
healthcheckPath = "/health/schema"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
