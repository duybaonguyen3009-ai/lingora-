# railway.toml — Railway deployment config for Lingora backend
#
# Docs: https://docs.railway.com/reference/config-as-code
#
# Lives at REPO ROOT (not backend/) — Railway only reads railway.toml from the
# repo root, even when the service Root Directory is a subfolder. The
# previous location backend/railway.toml was silently ignored, which caused
# migrations 0037–0039 to skip prod until a manual catch-up on 2026-04-24.
#
# Key design:
#   - releaseCommand runs node-pg-migrate BEFORE traffic is shifted to the new
#     deployment, so the DB schema is always ahead of the running code.
#   - healthcheckPath lets Railway confirm the new instance is up before
#     cutting over — zero-downtime deploys.

[build]
builder = "NIXPACKS"

[deploy]
startCommand    = "cd backend && npm start"
# Run migrations before the new instance receives traffic.
# node-pg-migrate reads DATABASE_URL from the environment automatically.
releaseCommand  = "cd backend && npx node-pg-migrate up --migrations-dir migrations --database-url-var DATABASE_URL"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
